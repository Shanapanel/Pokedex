<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Shanapanel Pokémon Eğitmen Paneli</title>
    <script id="dataScript" src="data.js"></script>
    <style>
        /* Hemi Head fontunu burada tanımlıyoruz */
        :root { 
            --neon-cyan: #00f2ff; 
            --neon-gold: #ffd700; 
            --neon-green: #00ff88; 
            --bg-dark: #06090f; 
            --card-bg: #11151c; 
            /* Font ismini buraya yazdım, PC'ndeki isimle birebir aynı olmalı */
            --main-font: 'Hemi Head', sans-serif; 
        }

        body { 
            background-color: var(--bg-dark); 
            color: #fff; 
            font-family: var(--main-font); 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
        }
        
        /* Sol Menü */
        #sidebar { width: 320px; background: #0a0d14; border-right: 2px solid var(--neon-cyan); padding: 25px; overflow-y: auto; }
        .trainer-btn { padding: 15px; margin-bottom: 12px; background: var(--card-bg); border-radius: 10px; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .trainer-btn.active { border-color: var(--neon-cyan); background: #161b25; box-shadow: 0 0 15px rgba(0, 242, 255, 0.2); }
        .trainer-btn h3 { margin: 0; font-size: 18px; color: var(--neon-cyan); letter-spacing: 1px; }
        
        /* Sağ Ekran */
        #main-view { flex: 1; padding: 30px; overflow-y: auto; background: radial-gradient(circle at top right, #0d121d, #06090f); }
        .header-box { background: rgba(255,255,255,0.02); padding: 20px; border-radius: 12px; border: 1px solid rgba(0, 242, 255, 0.2); margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .trainer-title { font-size: 38px; text-shadow: 0 0 15px var(--neon-cyan); letter-spacing: 2px; }
        
        /* SAVAŞ TAKIMI */
        .team-container { margin-bottom: 40px; padding: 20px; background: rgba(0, 242, 255, 0.05); border-radius: 15px; border: 1px dashed var(--neon-cyan); }
        .team-title { color: var(--neon-gold); font-size: 16px; margin-bottom: 15px; letter-spacing: 3px; text-align: center; }
        .team-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 15px; }
        .slot-box { background: #1a1f29; border-radius: 12px; padding: 10px; text-align: center; border: 2px solid #2a3241; transition: 0.3s; position: relative; }
        .slot-box.active-slot { border-color: var(--neon-gold); box-shadow: 0 0 15px rgba(255, 215, 0, 0.2); }
        .slot-box img { width: 100px; height: 100px; filter: drop-shadow(0 0 5px #000); }
        .slot-name { display: block; font-size: 13px; font-weight: bold; color: var(--neon-cyan); margin-top: 5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .slot-num { position: absolute; top: 5px; left: 8px; font-size: 10px; color: rgba(255,215,0,0.4); }

        /* POKEDEX IZGARASI */
        .pokedex-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; }
        .poke-box { background: #11151c; border-radius: 8px; padding: 10px; text-align: center; border: 1px solid rgba(255,255,255,0.03); position: relative; }
        .poke-box img { width: 70px; height: 70px; filter: brightness(0) invert(1) opacity(0.05); }
        .poke-box.owned { border-color: var(--neon-green); background: rgba(0, 255, 136, 0.03); }
        .poke-box.owned img { filter: brightness(1) invert(0) opacity(1); drop-shadow: 0 0 5px var(--neon-green); }
        .poke-name { display: block; margin-top: 5px; font-size: 11px; color: rgba(255,255,255,0.3); font-weight: bold; }
        .owned .poke-name { color: var(--neon-green); }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--neon-cyan); }
    </style>
</head>
<body>
    <div id="sidebar">
        <h2 style="color: var(--neon-cyan); text-align: center; letter-spacing: 2px; margin-bottom: 30px;">SHANA PANEL</h2>
        <div id="userList"></div>
    </div>
    
    <div id="main-view">
        <div id="welcome" style="text-align: center; margin-top: 150px; opacity: 0.2;">
            <h1 style="letter-spacing: 3px;">LÜTFEN BİR EĞİTMEN SEÇİNİZ</h1>
        </div>

        <div id="details" style="display: none;">
            <div class="header-box">
                <div id="d-name" class="trainer-title">---</div>
                <div id="d-gold" style="font-size: 26px; color: var(--neon-gold); font-weight: bold;">0 ALTIN</div>
            </div>

            <div class="team-container">
                <div class="team-title">AKTİF SAVAŞ TAKIMI (SLOT 1-6)</div>
                <div id="teamGrid" class="team-grid"></div>
            </div>

            <h3 style="color: var(--neon-cyan); font-size: 16px; margin-bottom: 15px; opacity: 0.6; letter-spacing: 1px;">TÜM POKÉDEX KOLEKSİYONU</h3>
            <div id="pokedexGrid" class="pokedex-grid"></div>
        </div>
    </div>

    <script>
        let selectedTrainerIndex = -1;
        // İNTERNET UYUMLU RESİM YOLU
        const imgBase = "sugimori/"; 

        function refreshData() {
            const oldScript = document.getElementById('dataScript');
            if (oldScript) oldScript.remove();
            const newScript = document.createElement('script');
            newScript.id = 'dataScript';
            newScript.src = 'data.js?t=' + Date.now();
            newScript.onload = () => {
                loadTrainers();
                if (selectedTrainerIndex !== -1) showTrainer(selectedTrainerIndex);
            };
            document.head.appendChild(newScript);
        }

        function loadTrainers() {
            if (typeof pokedata === 'undefined') return;
            const list = document.getElementById('userList');
            list.innerHTML = '';
            pokedata.players.forEach((p, index) => {
                const div = document.createElement('div');
                div.className = 'trainer-btn' + (selectedTrainerIndex === index ? ' active' : '');
                div.onclick = () => { selectedTrainerIndex = index; showTrainer(index); };
                div.innerHTML = `<h3>${p.userName}</h3><small>Koleksiyon: ${p.pokedexCount}/386</small>`;
                list.appendChild(div);
            });
        }

        function showTrainer(index) {
            const p = pokedata.players[index];
            if(!p) return;
            document.getElementById('welcome').style.display = 'none';
            document.getElementById('details').style.display = 'block';
            document.getElementById('d-name').innerText = p.userName;
            document.getElementById('d-gold').innerText = (p.gold || 0).toLocaleString() + " ALTIN";
            
            const names = pokedata.allNames || {};

            const tGrid = document.getElementById('teamGrid');
            tGrid.innerHTML = '';
            (p.party || [0,0,0,0,0,0]).forEach((pokeId, i) => {
                const sDiv = document.createElement('div');
                sDiv.className = `slot-box ${pokeId > 0 ? 'active-slot' : ''}`;
                const slotNum = i + 1;
                if(pokeId > 0) {
                    sDiv.innerHTML = `
                        <span class="slot-num">SLOT ${slotNum}</span>
                        <img src="${imgBase}${pokeId}.png">
                        <span class="slot-name">${names[pokeId] || 'Bilinmiyor'}</span>`;
                } else {
                    sDiv.innerHTML = `
                        <span class="slot-num">SLOT ${slotNum}</span>
                        <div style="height:100px; display:flex; align-items:center; justify-content:center; opacity:0.1; font-weight:bold;">BOŞ</div>`;
                }
                tGrid.appendChild(sDiv);
            });

            const pGrid = document.getElementById('pokedexGrid');
            pGrid.innerHTML = '';
            const owned = p.ownedList || [];
            for (let i = 1; i <= 386; i++) {
                const isOwned = owned.includes(i);
                const item = document.createElement('div');
                item.className = `poke-box ${isOwned ? 'owned' : ''}`;
                item.innerHTML = `
                    <span style="position:absolute; top:3px; right:5px; font-size:9px; opacity:0.3">#${i}</span>
                    <img src="${imgBase}${i}.png" loading="lazy">
                    <span class="poke-name">${isOwned ? (names[i] || 'YAKALANDI') : '???'}</span>`;
                pGrid.appendChild(item);
            }
        }

        setTimeout(refreshData, 100);
        setInterval(refreshData, 10000);
    </script>
</body>
</html>
